services:
  - type: web
    name: tainan
    runtime: node
    plan: free
    buildCommand: npm --prefix backend install --omit=dev
    startCommand: node backend/dist/server.js
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
